<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AS-LiD</title>
  
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* BACKGROUND SAMA SEPERTI INDEX */
body{
  background:
  linear-gradient(rgba(30,42,56,0.7), rgba(62,76,89,0.7)),
  url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1600');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  color:#333;
}
  .scrapbook{
  margin:40px auto;
  width:90%;
  max-width:1000px;

  background:#c8b6a6;

  border-radius:25px;

  padding:30px;

  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
.form-container {
background: #f5f1e8;
padding: 40px;
border-radius: 20px;
width: 400px;
    position: relative;


}
.close-btn {
    position: relative;
    position: absolute;
top: 15px;
right: 20px;
font-size: 22px;
cursor: pointer;
color: #333;
text-decoration: none;
font-weight: bold;
}

.close-btn:hover {
color: #1e2a38;
transform: scale(1.2);
transition: 0.2s ease;
}
h2 {
text-align: center;
}

input {
width: 100%;
padding: 10px;
margin: 10px 0;
border-radius: 8px;
border: 1px solid #ccc;
}

button {
width: 100%;
padding: 12px;
background: #2f3e46;
color: white;
border: none;
border-radius: 10px;
cursor: pointer;
}
  footer{

  margin-top:60px;

  background:rgba(15,23,30,0.92);

  backdrop-filter:blur(12px);

  padding:60px 8% 20px;

  color:#fff;

  border-top:1px solid rgba(255,255,255,0.1);
}

.footer-container{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(250px,1fr));

  gap:40px;

  margin-bottom:40px;
}

.footer-box h3{

  margin-bottom:20px;

  color:#c8b6a6;

  font-size:22px;
}

.footer-box h4{

  margin-top:10px;

  margin-bottom:10px;
}

.footer-box p{

  line-height:1.8;

  color:#ddd;

  font-size:14px;
}

.profile-pic{

  width:110px;

  height:110px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid rgba(255,255,255,0.15);

  margin-bottom:15px;
}

.footer-social{
  margin-top:20px;
}

.ig-link{

  display:inline-flex;

  justify-content:center;

  align-items:center;

  width:42px;

  height:42px;

  border-radius:50%;

  background:rgba(255,255,255,0.08);

  color:#fff;

  margin-right:10px;

  text-decoration:none;

  transition:0.3s;
}

.ig-link:hover{

  background:#c8b6a6;

  color:#1e2a38;

  transform:translateY(-4px);
}

.footer-bottom{

  text-align:center;

  padding-top:20px;

  border-top:1px solid rgba(255,255,255,0.1);

  font-size:14px;

  color:#bbb;
}

/* MOBILE */
@media(max-width:768px){

  nav{
    padding:18px 5%;
  }

  nav h1{
    font-size:24px;
  }

  .logo{
    width:55px;
    height:55px;
  }

  .container{
    padding:30px 20px;
  }

  .hero h2{
    font-size:32px;
  }

}

</style>
</head>

<body>

<div class="form-container">
<h2>Login</h2>
<a href="index.html" class="close-btn">✕</a>
<form id="loginForm">
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
</div>
  
<footer>

<div class="footer-bottom">
  &copy; 2026 AS-LiD | Access Sphere – Literature Digital
</div>

</footer>
  
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
e.preventDefault();

let storedUser = JSON.parse(localStorage.getItem("user"));

let email = this.querySelectorAll("input")[0].value;
let password = this.querySelectorAll("input")[1].value;

if(storedUser && email === storedUser.email && password === storedUser.password){
localStorage.setItem("isLoggedIn", "true");
localStorage.setItem("currentUser", storedUser.email);
window.location.href = "index.html";
} else {
alert("Email atau password salah!");
}
});
</script>

</body>
</html>
