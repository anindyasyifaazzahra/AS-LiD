<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - AS-LiD</title>

<style>

body{
  background:
  linear-gradient(rgba(30,42,56,0.7), rgba(62,76,89,0.7)),
  url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1600');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  color:#333;
}

.scrapbook{
  margin:40px auto;
  width:90%;
  max-width:1000px;

  background:#c8b6a6;

  border-radius:25px;

  padding:30px;

  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.form-container {
background: #f5f1e8;
padding: 40px;
border-radius: 20px;
width: 700px;
position: relative;
}

.close-btn {
position: absolute;
top: 15px;
right: 20px;
font-size: 22px;
cursor: pointer;
color: #333;
text-decoration: none;
font-weight: bold;
}

.close-btn:hover {
color: #1e2a38;
transform: scale(1.2);
transition: 0.2s ease;
}
h2 {
text-align: center;
}

form {
display: flex;
flex-wrap: wrap;
gap: 15px;
}

input {
flex: 1 1 45%;
padding: 10px;
border-radius: 8px;
border: 1px solid #ccc;
}

button {
width: 100%;
padding: 12px;
background: #2f3e46;
color: white;
border: none;
border-radius: 10px;
cursor: pointer;
margin-top: 15px;
}

button:hover {
background: #1e2a38;
}

footer{

  margin-top:60px;

  background:rgba(15,23,30,0.92);

  backdrop-filter:blur(12px);

  padding:60px 8% 20px;

  color:#fff;

  border-top:1px solid rgba(255,255,255,0.1);
}

.footer-container{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(250px,1fr));

  gap:40px;

  margin-bottom:40px;
}

.footer-box h3{

  margin-bottom:20px;

  color:#c8b6a6;

  font-size:22px;
}

.footer-box h4{

  margin-top:10px;

  margin-bottom:10px;
}

.footer-box p{

  line-height:1.8;

  color:#ddd;

  font-size:14px;
}

.profile-pic{

  width:110px;

  height:110px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid rgba(255,255,255,0.15);

  margin-bottom:15px;
}

.footer-social{
  margin-top:20px;
}

.ig-link{

  display:inline-flex;

  justify-content:center;

  align-items:center;

  width:42px;

  height:42px;

  border-radius:50%;

  background:rgba(255,255,255,0.08);

  color:#fff;

  margin-right:10px;

  text-decoration:none;

  transition:0.3s;
}

.ig-link:hover{

  background:#c8b6a6;

  color:#1e2a38;

  transform:translateY(-4px);
}

.footer-bottom{

  text-align:center;

  padding-top:20px;

  border-top:1px solid rgba(255,255,255,0.1);

  font-size:14px;

  color:#bbb;
}
</style>
</head>

<body>

<div class="form-container">

<a href="index.html" class="close-btn">✕</a>

<h2>Form Pendaftaran</h2>

<form id="registerForm">
        <input type="text" id="firstName" placeholder="First Name" required>
        <input type="text" id="lastName" placeholder="Last Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="phone" placeholder="Phone" required>
        <input type="password" id="password" placeholder="New Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <input type="text" placeholder="First Name" required>
        <input type="text" placeholder="Last Name" required>
        <input type="email" placeholder="Email" required>
        <input type="tel" placeholder="Phone" required>
        <input type="password" placeholder="Create New Password" required>
        <input type="password" placeholder="Confirm New Password" required>
<button type="submit">Daftar</button>
</form>
</div>
  
<footer>

<div class="footer-bottom">
  &copy; 2026 AS-LiD | Access Sphere – Literature Digital
</div>

</footer>
<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
document.getElementById("registerForm").addEventListener("submit", function(e) {
e.preventDefault();

    let firstName = document.getElementById("firstName").value;
    let lastName = document.getElementById("lastName").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Password tidak sama!");
        return;
    }

    localStorage.setItem("user", JSON.stringify({
        firstName: firstName,
        lastName: lastName,
        email: email,
        phone: phone,
        password: password
    }));
    let inputs = this.querySelectorAll("input");

    let user = {
        firstName: inputs[0].value,
        lastName: inputs[1].value,
        email: inputs[2].value,
        phone: inputs[3].value,
        password: inputs[4].value
    };

    localStorage.setItem("user", JSON.stringify(user));

alert("Pendaftaran berhasil! Silakan login.");
window.location.href = "login.html";
});

</script>

</body>
</html>
